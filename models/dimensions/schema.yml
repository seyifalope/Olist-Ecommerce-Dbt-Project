version: 2

models:
  - name: dim_customers
    description: "Customer dimension. One row per unique customer. Includes location and order history summary."
    columns:
      - name: customer_unique_id
        description: "Primary key. True unique identifier for each real customer."
        tests:
          - unique
          - not_null
      - name: customer_zip_code_prefix
        description: "First 5 digits of the customer zip code."
      - name: customer_city
        description: "City where the customer is located."
        tests:
          - not_null
      - name: customer_state
        description: "State where the customer is located."
        tests:
          - not_null
      - name: total_orders
        description: "Total number of orders placed by this customer."
      - name: first_order_date
        description: "Timestamp of the customer's first ever order."
      - name: last_order_date
        description: "Timestamp of the customer's most recent order."

  - name: dim_sellers
    description: "Seller dimension. One row per seller. Includes location and sales performance summary."
    columns:
      - name: seller_id
        description: "Primary key. Unique identifier for each seller."
        tests:
          - unique
          - not_null
      - name: seller_zip_code_prefix
        description: "First 5 digits of the seller zip code."
      - name: seller_city
        description: "City where the seller is located."
        tests:
          - not_null
      - name: seller_state
        description: "State where the seller is located."
        tests:
          - not_null
      - name: total_orders
        description: "Total number of orders fulfilled by this seller."
      - name: total_items_sold
        description: "Total number of items sold by this seller."
      - name: total_revenue
        description: "Total revenue generated by this seller in Brazilian Real."
      - name: total_freight_value
        description: "Total freight costs charged by this seller in Brazilian Real."

  - name: dim_products
    description: "Product dimension. One row per product. Includes category in English and sales performance summary."
    columns:
      - name: product_id
        description: "Primary key. Unique identifier for each product."
        tests:
          - unique
          - not_null
      - name: product_category_name
        description: "Product category name in Portuguese."
      - name: product_category_name_english
        description: "Product category name translated to English."
      - name: product_weight_g
        description: "Weight of the product in grams."
      - name: product_length_cm
        description: "Length of the product in centimetres."
      - name: product_height_cm
        description: "Height of the product in centimetres."
      - name: product_width_cm
        description: "Width of the product in centimetres."
      - name: total_orders
        description: "Total number of orders this product has appeared in."
      - name: total_revenue
        description: "Total revenue generated by this product in Brazilian Real."
      - name: total_freight_value
        description: "Total freight costs associated with this product in Brazilian Real."

  - name: dim_geolocation
    description: "Geolocation dimension. One row per zip code, city and state combination. Average coordinates per location."
    columns:
      - name: geolocation_zip_code_prefix
        description: "Primary key. First 5 digits of the zip code."
        tests:
          - not_null
      - name: geolocation_city
        description: "City name for this location."
        tests:
          - not_null
      - name: geolocation_state
        description: "State for this location."
        tests:
          - not_null
      - name: avg_lat
        description: "Average latitude coordinate for this zip code area."
      - name: avg_lng
        description: "Average longitude coordinate for this zip code area."