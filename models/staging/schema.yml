version: 2

models:
  - name: stg_olist__orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']

  - name: stg_olist__customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null

  - name: stg_olist__order_items
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null

  - name: stg_olist__order_payments
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_type
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']

  - name: stg_olist__order_reviews
    columns:
      - name: review_id
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: review_score
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]

  - name: stg_olist__products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_olist__sellers
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null

  - name: stg_olist__qualified_leads
    columns:
      - name: mql_id
        tests:
          - unique
          - not_null

  - name: stg_olist__closed_deals
    columns:
      - name: mql_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null